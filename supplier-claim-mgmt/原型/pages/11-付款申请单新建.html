<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>付款申请单新建</title><link rel="stylesheet" href="../assets/style.css"></head>
<body data-active="pay" data-crumb="支付管理 / 付款申请单新建">
<div class="app"><aside class="sidebar" id="sidebar"></aside>
<div class="main"><header class="topbar" id="topbar"></header>
<div class="content wrap-page">

  <div class="note-bar">进入时已校验：关联结算单已对账、发票已校验、无有效付款申请单——否则拦截并提示。</div>

  <div class="card"><div class="card-hd"><h3>基础信息（结算单自动带出 · 只读）</h3></div><div class="card-bd">
    <div class="form-grid">
      <div class="fg"><label>关联结算单号</label><div class="input ro mono">SPJS-20260701-0012</div></div>
      <div class="fg"><label>收款方全称</label><div class="input ro">苏州星辉服务中心</div></div>
      <div class="fg"><label>费用归属方</label><div class="input ro">闪欣动力</div></div>
      <div class="fg"><label>结算周期</label><div class="input ro">2026-06-01 ~ 06-30</div></div>
      <div class="fg"><label>申请付款总金额</label><div class="input ro money">¥12,480.00</div></div>
      <div class="fg"><label>发票校验状态</label><div class="input ro">已校验</div></div>
      <div class="fg"><label>申请人</label><div class="input ro">李索赔</div></div>
      <div class="fg"><label>申请部门</label><div class="input ro">售后索赔部</div></div>
      <div class="fg"><label>申请时间</label><div class="input ro">2026-07-13 09:14</div></div>
    </div>
  </div></div>

  <div class="card"><div class="card-hd"><h3>付款信息</h3></div><div class="card-bd">
    <div class="form-grid c2">
      <div class="fg"><label>开户银行全称 <span class="req">*</span></label><div class="input">中国工商银行苏州工业园区支行</div><div class="hint">最长 100 字</div></div>
      <div class="fg"><label>银行账号 <span class="req">*</span></label><div class="input mono">6222020200088896666</div><div class="hint">仅支持数字输入</div></div>
      <div class="fg"><label>账户名称 <span class="req">*</span></label><div class="input">苏州星辉服务中心有限公司</div><div class="hint warn">⚠ 须与收款方全称一致，不一致时弹风险提示</div></div>
      <div class="fg"><label>付款内容 <span class="req">*</span></label><div class="textarea" style="color:var(--text-2)">2026年6月保内维修索赔月度结算付款。</div><div class="hint">最长 300 字</div></div>
      <div class="fg" style="grid-column:span 2"><label>附件</label><div class="upload">点击或拖拽上传（图片 / PDF）</div></div>
    </div>
  </div></div>

  <div class="card"><div class="actionbar">
    <button class="btn">取消</button>
    <button class="btn">保存（存草稿·待提交）</button>
    <button class="btn btn--primary">提交（校验→二次确认→审批中）</button>
  </div></div>

</div></div></div>
<script src="../assets/app.js"></script></body></html>
